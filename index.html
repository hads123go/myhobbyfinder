<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Hobby Finder</title>

<!-- Two Google Fonts: Fraunces for headings (a little vintage, compass-like),
     Inter for body text (clean and easy to read). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ---------- Color palette & themes ----------
     Every color on the page reads from a CSS variable, so a whole
     "theme" is just a set of values for these variables.

     The default theme lives in :root below. Each other theme is a
     [data-theme="..."] block that overrides some of the same
     variables. The theme switcher (see the JavaScript near the
     bottom) picks a theme by setting data-theme on the <html> tag,
     and the browser repaints everything automatically.

     Note: the variable named --text-light holds the *main* text
     color for a theme (dark text on the light coastal themes), and
     --bg holds the page background — the names describe their JOB,
     not their lightness. */
  :root {
    /* Default theme — "Sea Glass": soft seafoam & sand, coral accent */
    --bg: #eaf1ec;
    --bg-2: #dbe8e0;          /* second stop, for the soft background gradient */
    --bg-card: #ffffff;
    --text-light: #2f4640;
    --text-muted: #6f8079;
    --paper: #f4ede1;
    --paper-text: #3a3427;
    --accent: #e0876b;
    --accent-dark: #c56f54;
    --needle-south: #cdd8d1;
    --btn-text: #ffffff;       /* text sitting on top of the accent color */
    --option-border: #d6e1da;  /* was a hardcoded white; now theme-aware */
    --option-hover-bg: #f1f6f2;
    --track-bg: rgba(47, 70, 64, 0.12); /* progress bar background */
    --weave: rgba(60, 80, 72, 0.05);    /* the faint linen texture lines */
  }

  [data-theme="nantucket"] {
    /* Crisp & nautical: pale sky, white cards, nautical-red accent */
    --bg: #eef4f8;
    --bg-2: #dce9f2;
    --bg-card: #ffffff;
    --text-light: #16324a;
    --text-muted: #5b7186;
    --paper: #f6f1e7;
    --paper-text: #2c3a44;
    --accent: #cf4a54;
    --accent-dark: #b03a48;
    --needle-south: #cdd9e2;
    --btn-text: #ffffff;
    --option-border: #d5e2ec;
    --option-hover-bg: #eef4f9;
    --track-bg: rgba(22, 50, 74, 0.12);
    --weave: rgba(22, 50, 74, 0.05);
  }

  [data-theme="shellsand"] {
    /* Warm & sandy: driftwood sand, warm whites, terracotta accent */
    --bg: #f3ebe0;
    --bg-2: #ecdfce;
    --bg-card: #fffaf3;
    --text-light: #4a3f35;
    --text-muted: #8a7c6d;
    --paper: #ecd3c4;
    --paper-text: #4a3f35;
    --accent: #c07a58;
    --accent-dark: #a56446;
    --needle-south: #e2d3c4;
    --btn-text: #fff7f0;
    --option-border: #e3d5c6;
    --option-hover-bg: #fbf3e9;
    --track-bg: rgba(74, 63, 53, 0.12);
    --weave: rgba(74, 63, 53, 0.05);
  }

  [data-theme="tidepool"] {
    /* Deep & moody: ocean-teal at dusk, amber accent (a darker theme) */
    --bg: #12403f;
    --bg-2: #0e3433;
    --bg-card: #1a4f4d;
    --text-light: #eaf3ef;
    --text-muted: #9fc0b8;
    --paper: #f0e9db;
    --paper-text: #23302c;
    --accent: #f2a25c;
    --accent-dark: #d9843f;
    --needle-south: #bcd6cd;
    --btn-text: #20303a;
    --option-border: #2c605d;
    --option-hover-bg: #235a58;
    --track-bg: rgba(255, 255, 255, 0.12);
    --weave: rgba(255, 255, 255, 0.04); /* light lines on a dark ground */
  }

  [data-theme="dawn"] {
    /* Soft & pastel: peach-to-lilac sunrise, morning-blue cards, dusty rose */
    --bg: #fbeee6;
    --bg-2: #f3e3ef;
    --bg-card: #fffdfb;
    --text-light: #4b3b47;
    --text-muted: #94808c;
    --paper: #e7eef2;
    --paper-text: #3a4650;
    --accent: #e0899a;
    --accent-dark: #cf7d8a;
    --needle-south: #ead6dd;
    --btn-text: #ffffff;
    --option-border: #efe1e8;
    --option-hover-bg: #fdf6fb;
    --track-bg: rgba(75, 59, 71, 0.12);
    --weave: rgba(75, 59, 71, 0.05);
  }

  [data-theme="oceanmist"] {
    /* Soft & blue: baby-blue ocean tones, warm-sand hobby cards */
    --bg: #eaf3fb;
    --bg-2: #d7e9f7;
    --bg-card: #ffffff;
    --text-light: #274a63;
    --text-muted: #6b8aa0;
    --paper: #f2ece0;
    --paper-text: #3a4650;
    --accent: #4a90bd;
    --accent-dark: #3b789f;
    --needle-south: #cfe0ec;
    --btn-text: #ffffff;
    --option-border: #d3e4f1;
    --option-hover-bg: #eef6fc;
    --track-bg: rgba(39, 74, 99, 0.12);
    --weave: rgba(39, 74, 99, 0.05);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    /* Two faint crosshatched gradients make a subtle woven-linen
       texture, layered on top of a soft two-tone background gradient.
       All pure CSS — no image files, so nothing extra to load. */
    background:
      repeating-linear-gradient(45deg,  var(--weave) 0 1px, transparent 1px 6px),
      repeating-linear-gradient(-45deg, var(--weave) 0 1px, transparent 1px 6px),
      linear-gradient(165deg, var(--bg), var(--bg-2));
    background-attachment: fixed;
    color: var(--text-light);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }

  h1, h2, h3 {
    font-family: 'Fraunces', serif;
    margin: 0 0 0.5em 0;
  }

  .page {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2.2rem;
    color: var(--accent);
  }

  header p {
    color: var(--text-muted);
    margin: 0;
  }

  /* ---------- Theme switcher ----------
     A row of pill buttons, one per theme. The buttons themselves
     read from the current theme's variables, so the switcher
     restyles itself along with the rest of the page. */
  .theme-switcher {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.25rem;
  }

  .theme-button {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: var(--bg-card);
    color: var(--text-light);
    border: 1px solid var(--option-border);
    border-radius: 999px;
    padding: 0.4rem 0.85rem 0.4rem 0.55rem;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }

  .theme-button:hover {
    border-color: var(--accent);
  }

  .theme-button .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  /* The currently selected theme's button gets an accent ring. */
  .theme-button[aria-pressed="true"] {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
    font-weight: 600;
  }

  .theme-button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Quiz card ---------- */
  #quiz-section {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 1.75rem;
  }

  #progress-text {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }

  #progress-bar-track {
    background: var(--track-bg);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  #progress-bar-fill {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }

  #question-text {
    font-size: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .option-button {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--bg);
    color: var(--text-light);
    border: 1px solid var(--option-border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.65rem;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .option-button:hover {
    border-color: var(--accent);
    background: var(--option-hover-bg);
  }

  /* ---------- Result section ---------- */
  #result-section {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 2rem 1.75rem;
    text-align: center;
  }

  /* Hidden until the quiz finishes. Toggled from JavaScript by
     adding/removing the "hidden" class (defined once, below). */
  .hidden {
    display: none;
  }

  /* The compass itself: a circle with N/E/S/W labels and a needle
     that rotates to point at the winning category. */
  #compass {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 1.5rem;
    border-radius: 50%;
    background: var(--bg);
    border: 4px solid var(--accent);
  }

  .compass-label {
    position: absolute;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.9rem;
  }

  #label-north { top: 10px; left: 50%; transform: translateX(-50%); }
  #label-east  { right: 12px; top: 50%; transform: translateY(-50%); }
  #label-south { bottom: 10px; left: 50%; transform: translateX(-50%); }
  #label-west  { left: 12px; top: 50%; transform: translateY(-50%); }

  /* The needle rotates by changing this element's "transform" in
     JavaScript. The transition below is what makes it glide to its
     new position instead of jumping there instantly. */
  #needle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: transform 1.2s ease;
  }

  /* The needle is built from two stacked triangles (a classic CSS
     trick: a wide border on one side of a zero-size box renders as
     a triangle). Together they form a pointed diamond shape. */
  .needle-half {
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
  }

  #needle-north {
    border-bottom: 78px solid var(--accent);
  }

  #needle-south {
    border-top: 78px solid var(--needle-south);
  }

  #result-category {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  #result-hobby-name {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }

  #result-blurb {
    color: var(--text-muted);
    max-width: 480px;
    margin: 0 auto 1rem;
  }

  #result-also-like {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
  }

  button.primary-button {
    background: var(--accent);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  button.primary-button:hover {
    background: var(--accent-dark);
  }

  /* ---------- Browse-all section ---------- */
  #browse-section {
    margin-top: 3rem;
  }

  #browse-section h2 {
    text-align: center;
    color: var(--accent);
  }

  .category-group {
    margin-bottom: 1.75rem;
  }

  .category-group h3 {
    color: var(--text-light);
    font-size: 1.05rem;
    margin-bottom: 0.75rem;
  }

  .hobby-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.75rem;
  }

  .hobby-card {
    background: var(--paper);
    color: var(--paper-text);
    border-radius: 8px;
    padding: 0.9rem 1rem;
  }

  .hobby-card strong {
    display: block;
    margin-bottom: 0.25rem;
  }

  .hobby-card span {
    font-size: 0.85rem;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>My Hobby Finder</h1>
    <p>Answer a few questions and let the needle find your hobby.</p>
    <!-- Theme buttons are injected here by JavaScript (renderThemeSwitcher). -->
    <div id="theme-switcher" class="theme-switcher" role="group" aria-label="Color theme"></div>
  </header>

  <main>

    <!-- ===================== QUIZ ===================== -->
    <section id="quiz-section">
      <p id="progress-text">Question 1 of 16</p>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <h2 id="question-text"></h2>
      <div id="options-container"></div>
    </section>

    <!-- ===================== RESULT (hidden until quiz ends) ===================== -->
    <section id="result-section" class="hidden">
      <div id="compass">
        <span class="compass-label" id="label-north">N</span>
        <span class="compass-label" id="label-east">E</span>
        <span class="compass-label" id="label-south">S</span>
        <span class="compass-label" id="label-west">W</span>
        <div id="needle">
          <div class="needle-half" id="needle-north"></div>
          <div class="needle-half" id="needle-south"></div>
        </div>
      </div>
      <p id="result-category"></p>
      <h2 id="result-hobby-name"></h2>
      <p id="result-blurb"></p>
      <p id="result-also-like"></p>
      <button class="primary-button" id="restart-button">Take the quiz again</button>
    </section>

    <!-- ===================== BROWSE ALL ===================== -->
    <section id="browse-section">
      <h2>Browse all hobbies</h2>
      <div id="browse-container"></div>
    </section>

  </main>
</div>

<script>
  // ---------------------------------------------------------------
  // DATA
  //
  // Four categories, each pointing at a compass direction. Each
  // category has a list of hobbies. The first hobby listed in a
  // category is the "flagship" one shown as the main quiz result;
  // the rest also appear in the "browse all" grid and the
  // "you might also enjoy" line.
  // ---------------------------------------------------------------
  const CATEGORIES = {
    active: {
      label: "Active",
      angle: 0, // north
      hobbies: [
        { name: "Rock Climbing", blurb: "A full-body challenge that mixes strength with problem-solving." },
        { name: "Hiking", blurb: "Explore trails at your own pace, with a view as the reward." },
        { name: "Cycling", blurb: "Cover ground, build endurance, and enjoy the wind in your face." },
        { name: "Trail Running", blurb: "Chase quiet miles on dirt paths where every run feels like an adventure." },
        { name: "Swimming", blurb: "A full-body workout that's easy on the joints and endlessly calming." },
        { name: "Kayaking", blurb: "Explore rivers and coastlines under your own paddle power." },
        { name: "Surfing", blurb: "Read the waves and chase that weightless glide back to shore." },
        { name: "Bouldering", blurb: "Short, punchy climbing puzzles solved close to the ground." },
        { name: "Martial Arts", blurb: "Build discipline, focus, and confidence one form at a time." },
        { name: "Dancing", blurb: "Move to the music and let your body do the talking." },
        { name: "Tennis", blurb: "Fast rallies, quick feet, and a game that's easy to fall for." },
        { name: "Skateboarding", blurb: "Balance, nerve, and the satisfying click of a landed trick." },
        { name: "Rowing", blurb: "Find a rhythm on the water and pull in perfect sync." }
      ]
    },
    creative: {
      label: "Creative",
      angle: 90, // east
      hobbies: [
        { name: "Painting", blurb: "Turn a blank canvas into whatever is in your head." },
        { name: "Photography", blurb: "Train your eye to notice the moments worth keeping." },
        { name: "Woodworking", blurb: "Build something real and useful with your own two hands." },
        { name: "Pottery", blurb: "Center a lump of clay and shape something you'll actually use." },
        { name: "Creative Writing", blurb: "Put the stories in your head onto the page, one line at a time." },
        { name: "Playing an Instrument", blurb: "Turn steady practice into progress you can hear." },
        { name: "Knitting", blurb: "Loop by loop, make something warm from a single strand of yarn." },

        { name: "Board Games", blurb: "An excuse to get people around a table and compete for fun." },
        { name: "Team Sports", blurb: "Shared effort, shared wins, and a built-in group of friends." },
        { name: "Volunteering", blurb: "Give your time to something bigger, alongside other people." },
        { name: "Dinner Parties", blurb: "Gather friends around good food and let the evening unfold." },
        { name: "Improv Comedy", blurb: "Think on your feet, laugh a lot, and make it up as you go." },
        { name: "Book Club", blurb: "Read something worth discussing, then discuss it with good company." },
        { name: "Karaoke", blurb: "Grab the mic, pick your anthem, and bring the room together." },
        { name: "Dungeons & Dragons", blurb: "Roll the dice and build a story with your friends over months." },
        { name: "Trivia Nights", blurb: "Put your random knowledge to work with a team at the pub." },
        { name: "Community Theater", blurb: "Rehearse, perform, and share the thrill of opening night." },
        { name: "Group Fitness", blurb: "Sweat alongside others who keep you showing up." },
        { name: "Choir", blurb: "Blend your voice with others and feel a song lift a whole room." }
      ]
    },
    calm: {
      label: "Calm",
      angle: 270, // west
      hobbies: [
        { name: "Reading", blurb: "A quiet way to live a hundred other lives." },
        { name: "Gardening", blurb: "Slow, steady progress you can watch grow over a season." },
        { name: "Meditation", blurb: "A daily reset for a calmer, more focused mind." },
        { name: "Yoga", blurb: "Move slowly, breathe deeply, and leave the mat feeling lighter." },
        { name: "Journaling", blurb: "A few quiet minutes a day to clear your head onto paper." },
        { name: "Birdwatching", blurb: "Slow down, look up, and notice the wildlife that's always been there." },
        { name: "Puzzles", blurb: "Lose yourself in a thousand pieces until the picture appears." },
        { name: "Stargazing", blurb: "Find a dark sky and let the universe put things in perspective." },
        { name: "Origami", blurb: "Fold a flat sheet of paper into something quietly astonishing." },
        { name: "Coloring", blurb: "Fill the lines, pick your palette, and let your mind wander." },
        { name: "Houseplant Care", blurb: "Tend a little indoor jungle and watch it thrive by the window." },
        { name: "Fishing", blurb: "Cast a line, settle in, and let the day slow to the water's pace." }
      ]
    }
  };

  // Each question has four options, one per category, so every
  // question nudges the needle a little in one of four directions.
  const QUESTIONS = [
    { text: "It's a free Saturday with no plans. What sounds best?", options: [
      { text: "Getting outside and moving my body", category: "active" },
      { text: "Making something with my hands", category: "creative" },
      { text: "Hanging out with a group of friends", category: "social" },
      { text: "A quiet day to myself", category: "calm" } ] },
    { text: "Pick a vacation.", options: [
      { text: "A hiking trip in the mountains", category: "active" },
      { text: "An art and museum tour", category: "creative" },
      { text: "A big group trip with friends", category: "social" },
      { text: "A quiet cabin in the woods", category: "calm" } ] },
    { text: "What's your ideal way to unwind after a long day?", options: [
      { text: "A workout or a walk", category: "active" },
      { text: "Working on a personal project", category: "creative" },
      { text: "Catching up with people I care about", category: "social" },
      { text: "Reading or relaxing quietly", category: "calm" } ] },
    { text: "Pick a work environment.", options: [
      { text: "One where I'm on my feet, moving around", category: "active" },
      { text: "One where I can design or build things", category: "creative" },
      { text: "One full of people and collaboration", category: "social" },
      { text: "A calm, quiet space I can focus in", category: "calm" } ] },
    { text: "Choose a superpower.", options: [
      { text: "Super speed", category: "active" },
      { text: "The ability to create anything I imagine", category: "creative" },
      { text: "The ability to bring any group together", category: "social" },
      { text: "Perfect focus and calm under pressure", category: "calm" } ] },
    { text: "What kind of movie do you gravitate towards?", options: [
      { text: "Action and adventure", category: "active" },
      { text: "Visually stunning or artistic films", category: "creative" },
      { text: "Feel-good ensemble comedies", category: "social" },
      { text: "Slow, thoughtful dramas", category: "calm" } ] },
    { text: "Pick a childhood memory you loved.", options: [
      { text: "Playing outside until dark", category: "active" },
      { text: "Building or drawing something new", category: "creative" },
      { text: "Playing games with a big group", category: "social" },
      { text: "Getting lost in a good book", category: "calm" } ] },
    { text: "What motivates you most?", options: [
      { text: "Physical challenge", category: "active" },
      { text: "Self-expression", category: "creative" },
      { text: "Connection with others", category: "social" },
      { text: "Inner peace", category: "calm" } ] },
    { text: "Choose a season.", options: [
      { text: "Summer — long days to be outside", category: "active" },
      { text: "Fall — a cozy, inspiring atmosphere", category: "creative" },
      { text: "Any season, as long as I'm with people", category: "social" },
      { text: "Winter — quiet and slow", category: "calm" } ] },
    { text: "Pick a place to spend an afternoon.", options: [
      { text: "A trail or park", category: "active" },
      { text: "A studio or workshop", category: "creative" },
      { text: "A lively cafe with friends", category: "social" },
      { text: "A quiet garden or library", category: "calm" } ] },
    { text: "What do you value most in a hobby?", options: [
      { text: "That it gets my heart pumping", category: "active" },
      { text: "That it lets me make something", category: "creative" },
      { text: "That I get to do it with others", category: "social" },
      { text: "That it helps me relax", category: "calm" } ] },
    { text: "Pick a fictional character you relate to.", options: [
      { text: "The adventurer", category: "active" },
      { text: "The artist", category: "creative" },
      { text: "The connector", category: "social" },
      { text: "The thinker", category: "calm" } ] },
    { text: "How do you like to spend a rainy day?", options: [
      { text: "Finding an indoor way to stay active", category: "active" },
      { text: "Sketching, writing, or making something", category: "creative" },
      { text: "Video-calling friends or hosting people", category: "social" },
      { text: "Curling up with tea and quiet", category: "calm" } ] },
    { text: "Pick a compliment you'd love to hear.", options: [
      { text: "You have so much energy", category: "active" },
      { text: "You're so imaginative", category: "creative" },
      { text: "You bring people together", category: "social" },
      { text: "You're so grounded and calm", category: "calm" } ] },
    { text: "Choose a goal for this year.", options: [
      { text: "Get stronger or more active", category: "active" },
      { text: "Finish a creative project", category: "creative" },
      { text: "Deepen my friendships", category: "social" },
      { text: "Feel calmer and more present", category: "calm" } ] },
    { text: "Last one — pick a Sunday morning.", options: [
      { text: "An early run or bike ride", category: "active" },
      { text: "A slow morning making something", category: "creative" },
      { text: "Brunch with friends", category: "social" },
      { text: "Coffee, quiet, and no agenda", category: "calm" } ] }
  ];

  // ---------------------------------------------------------------
  // STATE
  //
  // No localStorage on purpose — this is a personal-learning site,
  // so a page refresh should always start the quiz over cleanly.
  // Everything below lives only in memory.
  // ---------------------------------------------------------------
  let currentQuestionIndex = 0;
  let scores = { active: 0, creative: 0, social: 0, calm: 0 };

  // ---------------------------------------------------------------
  // QUIZ RENDERING
  // ---------------------------------------------------------------
  function renderQuestion() {
    const question = QUESTIONS[currentQuestionIndex];

    document.getElementById("progress-text").textContent =
      `Question ${currentQuestionIndex + 1} of ${QUESTIONS.length}`;
    document.getElementById("progress-bar-fill").style.width =
      `${(currentQuestionIndex / QUESTIONS.length) * 100}%`;

    document.getElementById("question-text").textContent = question.text;

    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";

    question.options.forEach(option => {
      const button = document.createElement("button");
      button.className = "option-button";
      button.textContent = option.text;
      button.addEventListener("click", () => selectAnswer(option.category));
      optionsContainer.appendChild(button);
    });
  }

  function selectAnswer(category) {
    scores[category] += 1;
    currentQuestionIndex += 1;

    if (currentQuestionIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  // ---------------------------------------------------------------
  // RESULT
  // ---------------------------------------------------------------
  function getWinningCategoryKey() {
    // Compares every category's score and keeps whichever is
    // highest so far. If there's a tie, the first one found wins,
    // which is good enough for a lighthearted quiz like this.
    let winningKey = null;
    let winningScore = -1;

    for (const key in scores) {
      if (scores[key] > winningScore) {
        winningScore = scores[key];
        winningKey = key;
      }
    }

    return winningKey;
  }

  function showResult() {
    document.getElementById("progress-bar-fill").style.width = "100%";
    document.getElementById("quiz-section").classList.add("hidden");
    document.getElementById("result-section").classList.remove("hidden");

    const categoryKey = getWinningCategoryKey();
    const category = CATEGORIES[categoryKey];
    const flagshipHobby = category.hobbies[0];
    // Show just a few of the other hobbies (not the whole list), so the
    // line stays short and readable even with ~12 hobbies per category.
    const otherHobbies = category.hobbies
      .slice(1, 4)
      .map(h => h.name)
      .join(", ");

    // Point the needle at the winning category's compass direction.
    // The 1.2s CSS transition (see #needle in the <style> above) is
    // what makes this a smooth animation instead of an instant jump.
    document.getElementById("needle").style.transform =
      `translate(-50%, -50%) rotate(${category.angle}deg)`;

    document.getElementById("result-category").textContent = category.label;
    document.getElementById("result-hobby-name").textContent = flagshipHobby.name;
    document.getElementById("result-blurb").textContent = flagshipHobby.blurb;
    document.getElementById("result-also-like").textContent =
      `You might also enjoy: ${otherHobbies}`;
  }

  function restartQuiz() {
    currentQuestionIndex = 0;
    scores = { active: 0, creative: 0, social: 0, calm: 0 };

    document.getElementById("needle").style.transform =
      "translate(-50%, -50%) rotate(0deg)";

    document.getElementById("result-section").classList.add("hidden");
    document.getElementById("quiz-section").classList.remove("hidden");

    renderQuestion();
  }

  document.getElementById("restart-button").addEventListener("click", restartQuiz);

  // ---------------------------------------------------------------
  // BROWSE ALL SECTION
  //
  // Always visible, independent of quiz progress. Lists every
  // hobby, grouped by category.
  // ---------------------------------------------------------------
  function renderBrowseAll() {
    const container = document.getElementById("browse-container");

    for (const key in CATEGORIES) {
      const category = CATEGORIES[key];

      const group = document.createElement("div");
      group.className = "category-group";

      const heading = document.createElement("h3");
      heading.textContent = category.label;
      group.appendChild(heading);

      const grid = document.createElement("div");
      grid.className = "hobby-grid";

      category.hobbies.forEach(hobby => {
        const card = document.createElement("div");
        card.className = "hobby-card";
        card.innerHTML = `<strong>${hobby.name}</strong><span>${hobby.blurb}</span>`;
        grid.appendChild(card);
      });

      group.appendChild(grid);
      container.appendChild(group);
    }
  }

  // ---------------------------------------------------------------
  // THEME SWITCHER
  //
  // Each theme is just a named set of CSS variables, defined in the
  // [data-theme="..."] blocks in the <style> section above. To switch
  // themes we put a matching data-theme attribute on the <html> tag
  // and the browser repaints the whole page — no reload needed.
  //
  // State is in-memory only, like the quiz: a page refresh returns to
  // the default "Sea Glass" theme.
  // ---------------------------------------------------------------
  const THEMES = [
    { key: "seaglass",  name: "Sea Glass",    accent: "#e0876b" },
    { key: "oceanmist", name: "Ocean Mist",   accent: "#4a90bd" },
    { key: "nantucket", name: "Nantucket",    accent: "#cf4a54" },
    { key: "shellsand", name: "Shell & Sand", accent: "#c07a58" },
    { key: "tidepool",  name: "Tidepool",     accent: "#f2a25c" },
    { key: "dawn",      name: "Coastal Dawn", accent: "#e0899a" }
  ];

  const DEFAULT_THEME = "seaglass";

  // Switch the page to a theme, and update which button looks selected.
  function applyTheme(themeKey) {
    document.documentElement.setAttribute("data-theme", themeKey);

    document.querySelectorAll(".theme-button").forEach(button => {
      const isActive = button.dataset.themeKey === themeKey;
      button.setAttribute("aria-pressed", isActive ? "true" : "false");
    });
  }

  function handleThemeButtonClick(themeKey) {
    applyTheme(themeKey);
  }

  // Build one pill button per theme and drop them into the header.
  function renderThemeSwitcher() {
    const container = document.getElementById("theme-switcher");

    THEMES.forEach(theme => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "theme-button";
      button.dataset.themeKey = theme.key;
      button.setAttribute("aria-pressed", "false");
      button.innerHTML =
        `<span class="dot" style="background:${theme.accent}"></span>${theme.name}`;
      button.addEventListener("click", () => handleThemeButtonClick(theme.key));
      container.appendChild(button);
    });

    applyTheme(DEFAULT_THEME);
  }

  // ---------------------------------------------------------------
  // START
  // ---------------------------------------------------------------
  renderThemeSwitcher();
  renderQuestion();
  renderBrowseAll();
</script>

</body>
</html>
